#region Meta
[project]
site_name = "Taskar Center for Accessible Technology"
site_description = "Information and guides related to the Taskar Center for Accessible Technology (TCAT) at the University of Washington."
site_author = "Taskar Center for Accessible Technology"
site_url = "https://taskarcenteratuw.github.io/tcat-wiki/"
repo_name = "TCAT Wiki"
repo_url = "https://github.com/taskarcenteratuw/tcat-wiki"
edit_uri = "edit/main/docs/"
copyright = """
  Copyright &copy; 2026 Taskar Center for Accessible Technology
  <a href="#__consent">Change cookie settings</a>
"""
extra_css = [
    "stylesheets/extra.css",
    "https://unpkg.com/katex@0/dist/katex.min.css",
    "https://cdn.jsdelivr.net/npm/img-comparison-slider@8/dist/styles.css"
]
extra_javascript = [
    "javascripts/extra.js",
    "javascripts/katex.js",
    "https://unpkg.com/katex@0/dist/katex.min.js",
    "https://unpkg.com/katex@0/dist/contrib/auto-render.min.js",
    "https://cdn.jsdelivr.net/npm/img-comparison-slider@8/dist/index.js"
]

#region Theme
[project.theme]
custom_dir = "overrides"
favicon = "resources/images/favicon/tcat/favicon.svg"
language = "en"
logo = "resources/images/logo/tcat/logo-light.png"
features = [
    "announce.dismiss",
    "content.action.edit",
    "content.action.view",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    #"header.autohide",
    #"navigation.expand",
    #"navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.instant.progress",
    "navigation.path",
    #"navigation.prune",
    "navigation.sections",
    "navigation.tabs",
    #"navigation.tabs.sticky",
    "navigation.top",
    "navigation.tracking",
    #"search.highlight",
    "toc.follow"
    #"toc.integrate"
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.theme.font]
text = "Atkinson Hyperlegible Next"
code = "Atkinson Hyperlegible Mono"

[project.theme.icon]
repo = "fontawesome/brands/github"

#region Extensions
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
#[project.markdown_extensions.def_list]
#[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
title = "On this page:"
permalink = "⚓︎"
permalink_title = "Anchor link to this section"
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
smart_enable = "all"
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.snippets]
auto_append = [ "includes/abbreviations.md" ]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
    {name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format"}
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
[project.markdown_extensions.zensical.extensions.glightbox]
auto = true
auto_themed = true
width = "100%"
height = "100%"
skip_classes = []
auto_caption = true
caption_position = "left"

#region Extras
[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/TaskarCenterAtUW/"
[[project.extra.social]]
icon = "fontawesome/brands/linkedin"
link = "https://www.linkedin.com/company/taskar-center-for-accessible-technology"
[[project.extra.social]]
icon = "fontawesome/brands/youtube"
link = "https://www.youtube.com/@taskarcenterstransportatio734"
[[project.extra.social]]
icon = "fontawesome/brands/facebook"
link = "https://www.facebook.com/TaskarCenter"
[[project.extra.social]]
icon = "fontawesome/brands/instagram"
link = "https://www.instagram.com/TaskarCenter/"

#region Analytics
[project.extra.analytics]
provider = "google"
property = "G-6YXHR48VQC"

[project.extra.consent]
title = "Cookie Settings"
description = """
    We use cookies to save your preferences and to collect analytics data using Google Analytics.
    This helps us understand how people find and use our documentation.
    You can update your cookie settings at any time from the bottom of any page.
"""
actions = [
    "accept",
    "reject"
]

#region Validation
[project.validation]
unresolved_references = true
unresolved_footnotes = true
unused_definitions = true
unused_footnotes = true
shadowed_definitions = true
shadowed_footnotes = true
invalid_links = true
invalid_link_anchors = true

